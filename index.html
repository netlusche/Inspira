<!DOCTYPE html>
<html lang="de" data-theme="dunkel">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspira – Weisheiten, die bewegen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

    <!-- Theme vor dem ersten Render setzen, um Flackern zu verhindern -->
    <script>
        (function () {
            var t = localStorage.getItem('quote-generator-theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>

    <style>
        /* ================================================================
           THEMES – CSS Custom Properties
        ================================================================ */
        [data-theme="hell"] {
            --bg-a:          #dbeafe;
            --bg-b:          #ede9fe;
            --card-bg:       rgba(255, 255, 255, 0.65);
            --card-border:   rgba(255, 255, 255, 0.85);
            --card-glow:     rgba(99, 102, 241, 0.08);
            --text:          #1e293b;
            --muted:         #64748b;
            --accent:        #6366f1;
            --accent-dark:   #4f46e5;
            --accent-fg:     #ffffff;
            --orb-a:         rgba(99, 102, 241, 0.22);
            --orb-b:         rgba(236, 72, 153, 0.12);
            --divider:       rgba(100, 116, 139, 0.18);
            --fav-bg:        rgba(255, 255, 255, 0.5);
            --badge-bg:      rgba(99, 102, 241, 0.12);
            --badge-fg:      #4f46e5;
            --ghost-bg:      rgba(255, 255, 255, 0.45);
            --ghost-border:  rgba(100, 116, 139, 0.25);
            --ghost-fg:      #1e293b;
            --ghost-hover:   rgba(99, 102, 241, 0.08);
            --select-bg:     rgba(255, 255, 255, 0.65);
            --shadow:        rgba(100, 116, 139, 0.2);
            --shadow-accent: rgba(99, 102, 241, 0.28);
            --toast-bg:      #1e293b;
            --toast-fg:      #f8fafc;
        }

        [data-theme="dunkel"] {
            --bg-a:          #0f172a;
            --bg-b:          #1e1b4b;
            --card-bg:       rgba(255, 255, 255, 0.06);
            --card-border:   rgba(255, 255, 255, 0.1);
            --card-glow:     rgba(129, 140, 248, 0.12);
            --text:          #f1f5f9;
            --muted:         #94a3b8;
            --accent:        #818cf8;
            --accent-dark:   #6366f1;
            --accent-fg:     #ffffff;
            --orb-a:         rgba(99, 102, 241, 0.28);
            --orb-b:         rgba(167, 139, 250, 0.18);
            --divider:       rgba(255, 255, 255, 0.08);
            --fav-bg:        rgba(255, 255, 255, 0.04);
            --badge-bg:      rgba(129, 140, 248, 0.18);
            --badge-fg:      #a5b4fc;
            --ghost-bg:      rgba(255, 255, 255, 0.07);
            --ghost-border:  rgba(255, 255, 255, 0.11);
            --ghost-fg:      #f1f5f9;
            --ghost-hover:   rgba(129, 140, 248, 0.1);
            --select-bg:     rgba(255, 255, 255, 0.08);
            --shadow:        rgba(0, 0, 0, 0.5);
            --shadow-accent: rgba(99, 102, 241, 0.3);
            --toast-bg:      #f1f5f9;
            --toast-fg:      #0f172a;
        }

        [data-theme="aurora"] {
            --bg-a:          #051937;
            --bg-b:          #160a2e;
            --card-bg:       rgba(255, 255, 255, 0.05);
            --card-border:   rgba(52, 211, 153, 0.2);
            --card-glow:     rgba(52, 211, 153, 0.08);
            --text:          #ecfdf5;
            --muted:         #6ee7b7;
            --accent:        #34d399;
            --accent-dark:   #10b981;
            --accent-fg:     #064e3b;
            --orb-a:         rgba(52, 211, 153, 0.18);
            --orb-b:         rgba(167, 139, 250, 0.22);
            --divider:       rgba(52, 211, 153, 0.12);
            --fav-bg:        rgba(52, 211, 153, 0.05);
            --badge-bg:      rgba(52, 211, 153, 0.15);
            --badge-fg:      #34d399;
            --ghost-bg:      rgba(52, 211, 153, 0.08);
            --ghost-border:  rgba(52, 211, 153, 0.2);
            --ghost-fg:      #ecfdf5;
            --ghost-hover:   rgba(52, 211, 153, 0.14);
            --select-bg:     rgba(52, 211, 153, 0.1);
            --shadow:        rgba(0, 0, 0, 0.6);
            --shadow-accent: rgba(52, 211, 153, 0.2);
            --toast-bg:      #ecfdf5;
            --toast-fg:      #064e3b;
        }

        /* ================================================================
           RESET & BASE
        ================================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { height: 100%; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 100%);
            color: var(--text);
            transition: background 0.45s ease, color 0.35s ease;
            overflow-x: hidden;
        }

        /* ================================================================
           BACKGROUND ORBS
        ================================================================ */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
        }

        .orb-1 {
            width: 560px; height: 560px;
            background: var(--orb-a);
            top: -180px; right: -140px;
            animation: floatA 22s ease-in-out infinite;
        }

        .orb-2 {
            width: 440px; height: 440px;
            background: var(--orb-b);
            bottom: -130px; left: -110px;
            animation: floatB 28s ease-in-out infinite;
        }

        @keyframes floatA {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-45px, 55px); }
        }

        @keyframes floatB {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(55px, -40px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .orb { animation: none; }
        }

        /* ================================================================
           LAYOUT WRAPPER
        ================================================================ */
        .wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.25rem 3rem;
        }

        /* ================================================================
           HEADER
        ================================================================ */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 640px;
            margin-bottom: 2.75rem;
            gap: 1rem;
        }

        .brand-title {
            font-size: 1.55rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text);
            transition: color 0.35s;
        }

        .brand-subtitle {
            font-size: 0.77rem;
            font-weight: 300;
            color: var(--muted);
            margin-top: 0.1rem;
            transition: color 0.35s;
        }

        /* ================================================================
           THEME SELECT
        ================================================================ */
        .theme-wrap { position: relative; flex-shrink: 0; }

        .theme-select {
            appearance: none;
            -webkit-appearance: none;
            background: var(--select-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 0.77rem;
            font-weight: 500;
            padding: 0.44rem 2.1rem 0.44rem 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: border-color 0.2s, color 0.35s, background 0.35s;
            outline: none;
        }

        .theme-select:hover { border-color: var(--accent); }

        .theme-select:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .theme-wrap::after {
            content: '›';
            position: absolute;
            right: 0.72rem;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            pointer-events: none;
            color: var(--muted);
            font-size: 0.95rem;
            transition: color 0.35s;
        }

        /* ================================================================
           MAIN
        ================================================================ */
        .site-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 1.125rem;
        }

        /* ================================================================
           QUOTE CARD
        ================================================================ */
        .quote-card {
            position: relative;
            width: 100%;
            max-width: 640px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 8px 40px var(--shadow), 0 0 80px var(--card-glow);
            overflow: hidden;
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.22s ease, transform 0.22s ease, box-shadow 0.3s, background 0.35s, border-color 0.35s;
        }

        /* Glassmorphism-Glanz */
        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 55%);
            pointer-events: none;
        }

        .quote-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .quote-badge {
            display: inline-flex;
            align-items: center;
            background: var(--badge-bg);
            color: var(--badge-fg);
            font-size: 0.67rem;
            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: background 0.35s, color 0.35s;
        }

        .quote-mark { display: none; }

        .quote-text::before {
            content: '"';
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.1em;
            color: var(--accent);
            opacity: 0.5;
            margin-right: 0.1em;
            transition: color 0.35s;
        }

        .quote-text {
            font-size: 1.28rem;
            font-weight: 300;
            font-style: italic;
            line-height: 1.78;
            color: var(--text);
            padding-top: 0.3rem;
            margin-bottom: 1.75rem;
            transition: color 0.35s;
        }

        .quote-sep {
            width: 36px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            margin-bottom: 1.5rem;
            opacity: 0.5;
            transition: background 0.35s;
        }

        .quote-author {
            display: flex;
            align-items: center;
            gap: 0.875rem;
        }

        .author-avatar {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--accent-fg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            box-shadow: 0 2px 10px var(--shadow-accent);
            transition: background 0.35s, color 0.35s;
        }

        .author-name {
            display: block;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
            transition: color 0.35s;
        }

        .author-desc {
            display: block;
            font-size: 0.73rem;
            color: var(--muted);
            margin-top: 0.1rem;
            transition: color 0.35s;
        }

        /* ================================================================
           ACTION BUTTONS
        ================================================================ */
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 640px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.57rem 1.05rem;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease,
                        background 0.3s, color 0.3s, border-color 0.3s, opacity 0.3s;
            outline: none;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn:active { transform: scale(0.95) !important; }

        .btn-primary {
            background: var(--accent);
            color: var(--accent-fg);
            box-shadow: 0 4px 14px var(--shadow-accent);
        }

        .btn-primary:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 22px var(--shadow-accent);
        }

        .btn-ghost {
            background: var(--ghost-bg);
            color: var(--ghost-fg);
            border: 1px solid var(--ghost-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-ghost:hover {
            background: var(--ghost-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-fav {
            background: var(--ghost-bg);
            color: var(--ghost-fg);
            border: 1px solid var(--ghost-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-fav:hover {
            border-color: #f43f5e;
            transform: translateY(-2px);
        }

        .btn-fav.is-fav {
            background: rgba(244, 63, 94, 0.12);
            border-color: #f43f5e;
            color: #f43f5e;
        }

        .btn-fav.is-fav:hover {
            background: rgba(244, 63, 94, 0.2);
        }

        /* ================================================================
           FAVORITES SECTION
        ================================================================ */
        .fav-section {
            width: 100%;
            max-width: 640px;
        }

        .fav-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.58rem 1.1rem;
            background: var(--ghost-bg);
            border: 1px solid var(--ghost-border);
            border-radius: 50px;
            color: var(--muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: color 0.2s, border-color 0.2s, background 0.3s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fav-toggle:hover { color: var(--text); border-color: var(--accent); }

        .fav-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .fav-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            background: var(--accent);
            color: var(--accent-fg);
            border-radius: 20px;
            font-size: 0.66rem;
            font-weight: 600;
            transition: background 0.35s, color 0.35s;
        }

        .fav-chevron {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--muted);
            transition: transform 0.22s ease, color 0.2s;
        }

        .fav-toggle[aria-expanded="true"] .fav-chevron {
            transform: rotate(180deg);
        }

        .fav-panel {
            margin-top: 0.6rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.1rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 6px 24px var(--shadow);
            animation: slideDown 0.22s ease;
            transition: background 0.35s, border-color 0.35s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .fav-panel { animation: none; }
        }

        .fav-empty {
            text-align: center;
            padding: 1.25rem 1rem;
            color: var(--muted);
            transition: color 0.35s;
        }

        .fav-empty-icon {
            font-size: 1.75rem;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.45;
        }

        .fav-empty p {
            font-size: 0.8rem;
            line-height: 1.55;
        }

        .fav-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .fav-item {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.625rem 0.75rem;
            background: var(--fav-bg);
            border: 1px solid var(--divider);
            border-radius: 12px;
            transition: border-color 0.2s, background 0.35s;
        }

        .fav-item:hover { border-color: var(--accent); }

        .fav-item-body {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .fav-item-text {
            font-size: 0.79rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.35s;
        }

        .fav-item-author {
            font-size: 0.69rem;
            color: var(--muted);
            margin-top: 0.1rem;
            transition: color 0.35s;
        }

        .fav-remove {
            flex-shrink: 0;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.75rem;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s, background 0.15s;
            outline: none;
        }

        .fav-remove:hover { color: #f43f5e; background: rgba(244, 63, 94, 0.1); }

        .fav-remove:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        /* ================================================================
           TOAST
        ================================================================ */
        .toast {
            position: fixed;
            bottom: 1.75rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--toast-bg);
            color: var(--toast-fg);
            padding: 0.55rem 1.2rem;
            border-radius: 50px;
            font-size: 0.79rem;
            font-weight: 500;
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (prefers-reduced-motion: reduce) {
            .toast {
                transition: opacity 0.2s;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ================================================================
           FOOTER
        ================================================================ */
        .site-footer {
            margin-top: auto;
            padding-top: 2.5rem;
            font-size: 0.71rem;
            color: var(--muted);
            opacity: 0.5;
            transition: color 0.35s;
        }

        /* ================================================================
           RESPONSIVE
        ================================================================ */
        @media (max-width: 480px) {
            .wrapper        { padding: 1.5rem 1rem 2.5rem; }
            .site-header    { margin-bottom: 2rem; }
            .brand-title    { font-size: 1.3rem; }
            .quote-card     { padding: 1.75rem 1.375rem; }
            .quote-text     { font-size: 1.1rem; }
            .actions        { gap: 0.4rem; }
            .btn            { font-size: 0.77rem; padding: 0.55rem 0.9rem; }
        }
    </style>
</head>

<body>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <div class="wrapper">

        <header class="site-header">
            <div>
                <h1 class="brand-title">✦ Inspira</h1>
                <p class="brand-subtitle">Weisheiten, die bewegen</p>
            </div>
            <div class="theme-wrap">
                <select class="theme-select" id="themeSelect" aria-label="Theme auswählen">
                    <option value="dunkel">Dunkel</option>
                    <option value="hell">Hell</option>
                    <option value="aurora">Aurora</option>
                </select>
            </div>
        </header>

        <main class="site-main">

            <article class="quote-card" id="quoteCard" aria-label="Aktuelles Zitat">
                <div class="quote-card-top">
                    <span class="quote-badge" id="quoteBadge" aria-label="Sprache">DE</span>
                </div>
                <span class="quote-mark" aria-hidden="true">"</span>
                <p class="quote-text" id="quoteText" aria-live="polite" aria-atomic="true"></p>
                <div class="quote-sep" aria-hidden="true"></div>
                <div class="quote-author">
                    <div class="author-avatar" id="authorAvatar" aria-hidden="true"></div>
                    <div>
                        <span class="author-name" id="authorName"></span>
                        <span class="author-desc" id="authorDesc"></span>
                    </div>
                </div>
            </article>

            <div class="actions" role="group" aria-label="Zitat-Aktionen">
                <button class="btn btn-primary" id="newQuoteBtn">
                    <span aria-hidden="true">↻</span> Neues Zitat
                </button>
                <button class="btn btn-ghost" id="copyBtn" aria-label="Zitat in Zwischenablage kopieren">
                    <span aria-hidden="true">⎘</span> Kopieren
                </button>
                <button class="btn btn-ghost" id="shareBtn" aria-label="Zitat teilen">
                    <span aria-hidden="true">↗</span> Teilen
                </button>
                <button class="btn btn-fav" id="favoriteBtn" aria-pressed="false" aria-label="Als Favorit speichern">
                    <span id="favIcon" aria-hidden="true">♡</span>
                    <span id="favLabel">Favorit</span>
                </button>
            </div>

            <section class="fav-section" aria-label="Gespeicherte Favoriten">
                <button class="fav-toggle" id="favToggle" aria-expanded="false" aria-controls="favPanel">
                    <span aria-hidden="true">♥</span>
                    Meine Favoriten
                    <span class="fav-badge" id="favCount" aria-label="Anzahl gespeicherter Favoriten">0</span>
                    <span class="fav-chevron" aria-hidden="true">▾</span>
                </button>
                <div id="favPanel" hidden>
                    <div class="fav-panel">
                        <div class="fav-empty" id="favEmpty">
                            <span class="fav-empty-icon" aria-hidden="true">♡</span>
                            <p>Noch keine Favoriten gespeichert.<br>Klicke auf „Favorit", um Zitate zu merken.</p>
                        </div>
                        <div class="fav-list" id="favList" role="list" aria-label="Gespeicherte Zitate"></div>
                    </div>
                </div>
            </section>

        </main>

        <footer class="site-footer">
            <p>Inspira &mdash; Weisheiten für jeden Tag</p>
        </footer>

    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script>
        'use strict';

        /* ============================================================
           CONSTANTS
        ============================================================ */
        const THEME_KEY = 'quote-generator-theme';
        const FAV_KEY   = 'quote-generator-favorites';

        /* ============================================================
           DOM-REFERENZEN
        ============================================================ */
        const quoteCard    = document.getElementById('quoteCard');
        const quoteTextEl  = document.getElementById('quoteText');
        const quoteBadgeEl = document.getElementById('quoteBadge');
        const authorAvEl   = document.getElementById('authorAvatar');
        const authorNameEl = document.getElementById('authorName');
        const authorDescEl = document.getElementById('authorDesc');
        const newQuoteBtn  = document.getElementById('newQuoteBtn');
        const copyBtn      = document.getElementById('copyBtn');
        const shareBtn     = document.getElementById('shareBtn');
        const favBtn       = document.getElementById('favoriteBtn');
        const favIconEl    = document.getElementById('favIcon');
        const favLabelEl   = document.getElementById('favLabel');
        const favToggle    = document.getElementById('favToggle');
        const favPanel     = document.getElementById('favPanel');
        const favEmptyEl   = document.getElementById('favEmpty');
        const favListEl    = document.getElementById('favList');
        const favCountEl   = document.getElementById('favCount');
        const toastEl      = document.getElementById('toast');
        const themeSelect  = document.getElementById('themeSelect');

        /* ============================================================
           STATE
        ============================================================ */
        let quotes       = [];
        let currentQuote = null;
        let favorites    = [];

        try { favorites = JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
        catch { favorites = []; }

        /* ============================================================
           THEME
        ============================================================ */
        function initTheme() {
            const saved = localStorage.getItem(THEME_KEY) || 'dunkel';
            document.documentElement.setAttribute('data-theme', saved);
            themeSelect.value = saved;
        }

        themeSelect.addEventListener('change', function () {
            const t = this.value;
            document.documentElement.setAttribute('data-theme', t);
            try { localStorage.setItem(THEME_KEY, t); } catch (e) { /* silent */ }
        });

        initTheme();

        /* ============================================================
           TOAST
        ============================================================ */
        let toastTimer;

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () {
                toastEl.classList.remove('show');
            }, 2700);
        }

        /* ============================================================
           HILFSFUNKTIONEN
        ============================================================ */
        function getInitials(name) {
            return name.trim().split(/\s+/).slice(0, 2).map(function (w) {
                return w[0].toUpperCase();
            }).join('');
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function prefersReducedMotion() {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        /* ============================================================
           ZITAT ANZEIGEN
        ============================================================ */
        function renderQuote(quote) {
            currentQuote = quote;
            quoteTextEl.textContent  = quote.text;
            authorNameEl.textContent = quote.author;
            authorDescEl.textContent = quote.description || '';
            authorAvEl.textContent   = getInitials(quote.author);
            quoteBadgeEl.textContent = (quote.lang || 'de').toUpperCase();
            updateFavBtn();
        }

        var quoteAnimTimer;

        function showQuote(quote) {
            clearTimeout(quoteAnimTimer);

            if (prefersReducedMotion()) {
                renderQuote(quote);
                return;
            }

            quoteCard.style.opacity   = '0';
            quoteCard.style.transform = 'translateY(-6px) scale(0.99)';

            quoteAnimTimer = setTimeout(function () {
                renderQuote(quote);
                quoteCard.style.opacity   = '';
                quoteCard.style.transform = '';
            }, 220);
        }

        function showRandomQuote() {
            if (!quotes.length) return;
            var next;
            if (quotes.length > 1) {
                do {
                    next = quotes[Math.floor(Math.random() * quotes.length)];
                } while (next === currentQuote);
            } else {
                next = quotes[0];
            }
            showQuote(next);
        }

        /* ============================================================
           FAVORITEN – Persistenz
        ============================================================ */
        function saveFavs() {
            try { localStorage.setItem(FAV_KEY, JSON.stringify(favorites)); }
            catch (e) { /* silent */ }
        }

        function isFav(q) {
            return favorites.some(function (f) {
                return f.text === q.text && f.author === q.author;
            });
        }

        function updateFavBtn() {
            if (!currentQuote) return;
            var active = isFav(currentQuote);
            favBtn.classList.toggle('is-fav', active);
            favBtn.setAttribute('aria-pressed', String(active));
            favIconEl.textContent  = active ? '♥' : '♡';
            favLabelEl.textContent = active ? 'Gespeichert' : 'Favorit';
        }

        function toggleFav() {
            if (!currentQuote) return;
            if (isFav(currentQuote)) {
                favorites = favorites.filter(function (f) {
                    return !(f.text === currentQuote.text && f.author === currentQuote.author);
                });
                showToast('Favorit entfernt');
            } else {
                favorites.push({
                    text:        currentQuote.text,
                    author:      currentQuote.author,
                    description: currentQuote.description || '',
                    lang:        currentQuote.lang || 'de',
                    category:    currentQuote.category || ''
                });
                showToast('Als Favorit gespeichert ♥');
            }
            saveFavs();
            updateFavBtn();
            updateFavCount();
            if (!favPanel.hidden) renderFavList();
        }

        function updateFavCount() {
            favCountEl.textContent = favorites.length;
        }

        /* ============================================================
           FAVORITEN – Liste rendern
        ============================================================ */
        function renderFavList() {
            favListEl.innerHTML = '';

            if (!favorites.length) {
                favEmptyEl.hidden = false;
                return;
            }
            favEmptyEl.hidden = true;

            favorites.forEach(function (fav, index) {
                var item = document.createElement('div');
                item.className = 'fav-item';
                item.setAttribute('role', 'listitem');

                var body = document.createElement('div');
                body.className = 'fav-item-body';
                body.setAttribute('role', 'button');
                body.setAttribute('tabindex', '0');
                body.setAttribute('aria-label', 'Zitat von ' + fav.author + ' anzeigen');
                body.innerHTML =
                    '<div class="fav-item-text">' + escHtml(fav.text) + '</div>' +
                    '<div class="fav-item-author">— ' + escHtml(fav.author) + '</div>';

                function activateFav() {
                    var found = quotes.find(function (q) {
                        return q.text === fav.text && q.author === fav.author;
                    }) || fav;
                    showQuote(found);
                    if (window.innerWidth < 500) {
                        favPanel.hidden = true;
                        favToggle.setAttribute('aria-expanded', 'false');
                    }
                }

                body.addEventListener('click', activateFav);
                body.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        activateFav();
                    }
                });

                var rmBtn = document.createElement('button');
                rmBtn.className = 'fav-remove';
                rmBtn.setAttribute('aria-label', fav.author + ' aus Favoriten entfernen');
                rmBtn.textContent = '✕';
                rmBtn.addEventListener('click', function () {
                    favorites.splice(index, 1);
                    saveFavs();
                    updateFavBtn();
                    updateFavCount();
                    renderFavList();
                });

                item.appendChild(body);
                item.appendChild(rmBtn);
                favListEl.appendChild(item);
            });
        }

        /* ============================================================
           FAVORITEN – Panel umschalten
        ============================================================ */
        favToggle.addEventListener('click', function () {
            var open = favPanel.hidden;
            favPanel.hidden = !open;
            favToggle.setAttribute('aria-expanded', String(open));
            if (open) renderFavList();
        });

        /* ============================================================
           KOPIEREN
        ============================================================ */
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            }
            return new Promise(function (resolve, reject) {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;left:-9999px;opacity:0;pointer-events:none';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try {
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    resolve();
                } catch (err) {
                    document.body.removeChild(ta);
                    reject(err);
                }
            });
        }

        function copyQuote() {
            if (!currentQuote) return;
            var text = '„' + currentQuote.text + '“ – ' + currentQuote.author;
            copyToClipboard(text)
                .then(function () { showToast('Zitat kopiert ⎘'); })
                .catch(function () { showToast('Kopieren nicht möglich'); });
        }

        /* ============================================================
           TEILEN
        ============================================================ */
        function shareQuote() {
            if (!currentQuote) return;
            var text = '„' + currentQuote.text + '“ – ' + currentQuote.author;

            if (navigator.share) {
                navigator.share({ title: 'Inspira', text: text })
                    .catch(function (e) {
                        if (e.name !== 'AbortError') showToast('Teilen fehlgeschlagen');
                    });
            } else {
                copyToClipboard(text)
                    .then(function () { showToast('In Zwischenablage kopiert (Teilen nicht verfügbar)'); })
                    .catch(function () { showToast('Teilen nicht möglich'); });
            }
        }

        /* ============================================================
           ZITATE LADEN & INITIALISIERUNG
        ============================================================ */
        function init() {
            fetch('quotes.json')
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function (data) {
                    quotes = data;
                    renderQuote(quotes[Math.floor(Math.random() * quotes.length)]);
                    updateFavCount();
                })
                .catch(function () {
                    quoteTextEl.textContent  = 'Zitate konnten nicht geladen werden.';
                    authorNameEl.textContent = '';
                    authorDescEl.textContent = '';
                });
        }

        /* ============================================================
           EVENT LISTENER
        ============================================================ */
        newQuoteBtn.addEventListener('click', showRandomQuote);
        copyBtn.addEventListener('click', copyQuote);
        shareBtn.addEventListener('click', shareQuote);
        favBtn.addEventListener('click', toggleFav);

        init();
    </script>
</body>
</html>
