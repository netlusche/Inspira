<!DOCTYPE html>
<html lang="de" data-theme="dunkel">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspira – Weisheiten, die bewegen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/app.css">

    <!-- Theme vor dem ersten Render setzen, um Flackern zu verhindern -->
    <script>
        (function () {
            var t = localStorage.getItem('quote-generator-theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>

<body>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <div class="wrapper">

        <header class="site-header">
            <div>
                <h1 class="brand-title">✦ Inspira</h1>
                <p class="brand-subtitle">Weisheiten, die bewegen</p>
            </div>
            <div class="theme-wrap">
                <select class="theme-select" id="themeSelect" aria-label="Theme auswählen">
                    <option value="dunkel">Dunkel</option>
                    <option value="hell">Hell</option>
                    <option value="aurora">Aurora</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="matrix">Matrix</option>
                    <option value="lcars">LCARS</option>
                    <option value="frutiger-aero">Frutiger Aero</option>
                </select>
            </div>
        </header>

        <main class="site-main">

            <article class="quote-card" id="quoteCard" aria-label="Aktuelles Zitat">
                <div class="quote-card-top">
                    <span class="quote-badge" id="quoteBadge" aria-label="Sprache">DE</span>
                </div>
                <span class="quote-mark" aria-hidden="true">"</span>
                <p class="quote-text" id="quoteText" aria-live="polite" aria-atomic="true"></p>
                <div class="quote-sep" aria-hidden="true"></div>
                <div class="quote-author">
                    <div class="author-avatar" id="authorAvatar" aria-hidden="true"></div>
                    <div>
                        <span class="author-name" id="authorName"></span>
                        <span class="author-desc" id="authorDesc"></span>
                    </div>
                </div>
            </article>

            <div class="actions" role="group" aria-label="Zitat-Aktionen">
                <button class="btn btn-primary" id="newQuoteBtn">
                    <span aria-hidden="true">↻</span> Neues Zitat
                </button>
                <button class="btn btn-ghost" id="copyBtn" aria-label="Zitat in Zwischenablage kopieren">
                    <span aria-hidden="true">⎘</span> Kopieren
                </button>
                <button class="btn btn-ghost" id="shareBtn" aria-label="Zitat teilen">
                    <span aria-hidden="true">↗</span> Teilen
                </button>
                <button class="btn btn-fav" id="favoriteBtn" aria-pressed="false" aria-label="Als Favorit speichern">
                    <span id="favIcon" aria-hidden="true">♡</span>
                    <span id="favLabel">Favorit</span>
                </button>
            </div>

            <section class="fav-section" aria-label="Gespeicherte Favoriten">
                <button class="fav-toggle" id="favToggle" aria-expanded="false" aria-controls="favPanel">
                    <span aria-hidden="true">♥</span>
                    Meine Favoriten
                    <span class="fav-badge" id="favCount" aria-label="Anzahl gespeicherter Favoriten">0</span>
                    <span class="fav-chevron" aria-hidden="true">▾</span>
                </button>
                <div id="favPanel" hidden>
                    <div class="fav-panel">
                        <div class="fav-empty" id="favEmpty">
                            <span class="fav-empty-icon" aria-hidden="true">♡</span>
                            <p>Noch keine Favoriten gespeichert.<br>Klicke auf „Favorit", um Zitate zu merken.</p>
                        </div>
                        <div class="fav-list" id="favList" role="list" aria-label="Gespeicherte Zitate"></div>
                    </div>
                </div>
            </section>

        </main>

        <footer class="site-footer">
            <p>Inspira &mdash; Weisheiten für jeden Tag</p>
        </footer>

    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/effects.js"></script>
</body>
</html>
